name: Java CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile code
        run: javac src/*.java

      - name: Check all required files exist
        run: |
          for f in src/Order.java src/PhysicalOrder.java src/DigitalOrder.java src/Product.java src/ECommerceSystem.java README.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING FILE: $f"
              exit 1
            else
              echo "FOUND: $f"
            fi
          done

      - name: Check README is not empty
        run: |
          if [ ! -s README.md ]; then
            echo "README.md is empty"
            exit 1
          else
            echo "README.md looks good"
          fi